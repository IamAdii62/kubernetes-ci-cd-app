name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build frontend image (root folder)
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest .

      # 4. Build backend image (backend folder)
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      # 5. Push frontend image
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      # 6. Push backend image
      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
